<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>WebApp Examples</title>
	<link rel="stylesheet" href="style.css">

	<!-- Tabular stuff -->
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		@keyframes scale-in {
			from {
				transform: scale(.95);
				opacity: 0;
			}
			to {
				transform: scale(1);
				opacity: 1;
			}
		}
		.animate-scale-in {
			animation: scale-in .15s ease-out;
		}
	</style>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						'sans': ['Inter', 'system-ui', 'sans-serif'],
					}
				}
			}
		}
	</script>
</head>

<body>
	<section id="app">
		<noscript>
			<div style="padding:2em;text-align:center;font-size:2em">
				Please enable JavaScript!
			</div>
		</noscript>
	</section>


	<footer class="info">
		<button id="todolist-btn">Show Todo List</button>
		<button id="calendar-btn">Show Calendar</button>
		<button id="unit-conversion-btn">Show Unit Conversion</button>
		<button id="tabular-btn">Show Tabular</button>
		<p>Created by the <a href="https://www.st.informatik.tu-darmstadt.de/">Software Technology Group</a></p>
		<p>Todolist based on <a href="https://todomvc.com">TodoMVC</a></p>
	</footer>

	<script type="module" src="main.js"></script>

</body>

</html>
